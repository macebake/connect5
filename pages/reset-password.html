<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 5 - Reset Password</title>
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ctext y=".9em" font-size="90"%3E%F0%9F%96%90%EF%B8%8F%3C/text%3E%3C/svg%3E'>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="header">
            <h1>Reset Password</h1>
            <p class="tagline">Choose a new password for your Connect 5 account.</p>
        </div>

        <div class="auth-section">
            <div id="resetMessage" class="message info">Checking your reset link...</div>

            <form id="resetForm" class="auth-form active">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="resetBtn">Update Password</button>
            </form>
        </div>
    </div>

    <script type="module" src="../assets/js/pages/reset-password-page.js"></script>
</body>
</html>
