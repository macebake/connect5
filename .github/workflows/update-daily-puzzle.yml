name: Update Daily Puzzle

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-daily-puzzle:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's daily puzzle
        env:
          CONNECT5_DAILY_SECRET: ${{ secrets.CONNECT5_DAILY_SECRET }}
        run: node scripts/generate-daily-puzzle.mjs

      - name: Commit updated puzzle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/daily-puzzle.json
          git diff --cached --quiet && exit 0
          git commit -m "Update daily puzzle"
          git push
