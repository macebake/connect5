<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 5 - Reset Password</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="header">
            <h1>Reset Password</h1>
            <p class="tagline">Choose a new password for your Connect 5 account.</p>
        </div>

        <div class="auth-section">
            <div id="resetMessage" class="message info">Checking your reset link...</div>

            <form id="resetForm" class="auth-form active">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="resetBtn">Update Password</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabaseClient } from './assets/js/auth/supabase-client.js';

        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('resetMessage');
        resetBtn.disabled = true;

        function showMessage(message, type) {
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }

        async function initializeReset() {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session) {
                    resetBtn.disabled = false;
                    showMessage('Enter your new password below.', 'info');
                }
            });

            const { data: { session } } = await supabaseClient.auth.getSession();

            if (!session) {
                showMessage('This reset link is invalid or expired. Request a new one from the sign-in screen.', 'error');
                return;
            }

            resetBtn.disabled = false;
            showMessage('Enter your new password below.', 'info');
        }

        resetForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            try {
                const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
                if (error) throw error;

                showMessage('Password updated. Redirecting to sign in...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html?tab=login';
                }, 1500);
            } catch (error) {
                showMessage(error.message || 'Failed to update your password.', 'error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            }
        });

        void initializeReset();
    </script>
</body>
</html>
